
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WiiM Player</title>
<link rel="icon" type="image/x-icon" href="wiim.ico">
<style>
body { margin:0; font-family:Arial; background:#111; color:white; display:flex; height:100vh; }
#cover { width:50%; background:#000 center/cover no-repeat; }
#info { width:50%; padding:40px; display:flex; flex-direction:column; justify-content:center; }
h1 { font-size:2.5em; margin:0; }
h2,h3 { margin:5px 0; font-weight:normal; color:#ccc; }
.controls button { background:#222; border:none; color:white; padding:10px 15px; margin:5px; font-size:18px; cursor:pointer; }
.controls button:hover { background:#444; }

/* ===== Narrow volume slider ===== */
#volume {
    width: 50%;          /* narrower slider */
    margin-top: 20px;
    height: 6px;         /* thinner track */
    accent-color: #1db954;  /* modern green accent color */
}

#quality { margin-top:10px; color:#aaa; }
a { color:#ccc; text-decoration:none; }
a:hover { text-decoration:underline; }
</style>
</head>
<body>

<div id="cover"></div>

<div id="info">
  <h1 id="title"></h1>
  <h2 id="artist"></h2>
  <h3 id="album"></h3>

  <div class="controls">
    <button onclick="cmd('prev')">⏮</button>
    <button onclick="cmd('toggle')" id="toggle">▶</button>
    <button onclick="cmd('next')">⏭</button>
  </div>

  <input type="range" id="volume" min="0" max="100">
  <div id="quality"></div>
</div>

<script>
let currentTrack = "";
const volumeSlider = document.getElementById("volume");

// ===== Fetch metadata =====
function fetchData() {
  fetch('?action=getdata')
    .then(r => r.json())
    .then(data => {
      if (!data.title) return;
      let trackId = data.artist + data.title;
      if (trackId === currentTrack) return; // smart refresh
      currentTrack = trackId;

      document.getElementById("title").innerText = data.title;
      document.getElementById("artist").innerText = data.artist;

      // Album hyperlink to RateYourMusic
      const albumEl = document.getElementById("album");
      const artistEncoded = encodeURIComponent(data.artist);
      const albumEncoded = encodeURIComponent(data.album);
      const albumUrl = `https://rateyourmusic.com/search?searchterm=${artistEncoded}%20-%20${albumEncoded}`;
      albumEl.innerHTML = `<a href="${albumUrl}" target="_blank">${data.album}</a>`;

      document.getElementById("cover").style.backgroundImage = `url('${data.albumArtURI}')`;
      document.title = `${data.artist} - ${data.title}`;

      // ===== Bitrate / Sample info =====
      const depth = data["song:format_s"] || 16;
      const rate = data["song:rate_hz"] || 44.1;
      const bitrate = data["song:bitrate"] ? `${data["song:bitrate"]} kbps` : "";
      const actualQuality = data["song:actualQuality"] || "";
      document.getElementById("quality").innerText = `${depth} bits / ${rate} kHz   ${bitrate}   ${actualQuality}`;
    });
}

// ===== Playback controls =====
function cmd(c) {
  if(c==="toggle") {
    fetch('?action=status')
      .then(r=>r.json())
      .then(s=>{
        c = (s.CurrentTransportState==="PLAYING") ? "pause":"play";
        fetch('?action='+c);
      });
  } else fetch('?action='+c);
}

// ===== Volume slider =====
let volTimeout;
volumeSlider.addEventListener("input", e=>{
  clearTimeout(volTimeout);
  volTimeout = setTimeout(()=>{
    let val = parseInt(e.target.value);
    fetch(`?action=volume&set=${val}`)
      .then(r=>r.json())
      .then(d=>{
        if(d.CurrentVolume !== undefined) volumeSlider.value = d.CurrentVolume;
      });
  },150);
});

function fetchVolume() {
  fetch('?action=volume')
    .then(r=>r.json())
    .then(d=>{
      if(d.CurrentVolume !== undefined) {
        let val = parseInt(d.CurrentVolume);
        if(volumeSlider.value != val) volumeSlider.value = val;
      }
    });
}

// ===== Auto-refresh =====
setInterval(fetchData, 2000);
setInterval(fetchVolume, 5000);

fetchData();
fetchVolume();
</script>

</body>
</html>
